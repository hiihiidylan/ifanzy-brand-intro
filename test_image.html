<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test Image</title>
</head>
<body style="background:#0a0a0a;color:#fff;padding:50px">
<h1>Image Test</h1>
<p>Test 1: Relative path</p>
<img src="creator_dashboard.png" style="max-width:800px;border:2px solid yellow">

<p>Test 2: With ./ prefix</p>
<img src="./creator_dashboard.png" style="max-width:800px;border:2px solid green">

<p>Test 3: Full URL</p>
<img src="http://127.0.0.1:8080/creator_dashboard.png" style="max-width:800px;border:2px solid blue">
</body>
</html>
